    body {

      margin: 0;
      height: 100vh;
      width: 100vw;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    #loading-screen {
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      min-height: 100vh;
      width: 100%;
      transition: opacity 0.4s ease;
    }

    #loading-screen img {
      max-width: 80%;
      max-height: 80%;
    }
  </style>

<body>

  <div id="loading-screen">
    <img src="loader_2.gif" alt="Loading Mohammed Ashraf's Portfolio...">
  </div>

  <script src="flutter_bootstrap.js" async></script>

  <script>
    // Remove loader smoothly once Flutter is ready
    window.addEventListener('flutter-first-frame', function () {
      const loader = document.getElementById('loading-screen');
      if (loader) {
        loader.style.opacity = '0';
        setTimeout(() => loader.remove(), 400);
      }
    });
  </script>

</body>
